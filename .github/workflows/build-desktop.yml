name: Build & Release Desktop App

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact: "*.dmg"
          - os: windows-latest
            platform: win
            artifact: "*.exe"
          - os: ubuntu-latest
            platform: linux
            artifact: "*.AppImage"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build ${{ matrix.platform }}
        run: npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 19labs-${{ matrix.platform }}
          path: desktop/dist/${{ matrix.artifact }}
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "19Labs v1.0.0 — The Cursor for Data Science"
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            ## 19Labs Desktop App

            **The Cursor for Data Science** — autonomous ML research in a native app.

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS | `19Labs-1.0.0.dmg` |
            | Windows | `19Labs Setup 1.0.0.exe` |
            | Linux | `19Labs-1.0.0.AppImage` |

            ### Or use in the browser
            → [yc-able.com/app](https://yc-able.com/app)
          files: artifacts/**/*
