name: Build macOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build macOS DMG
        working-directory: desktop
        run: npx electron-builder --mac --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List output
        run: ls -la desktop/dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "19Labs v1.0.0"
          files: desktop/dist/*.dmg
          body: |
            ## 19Labs - The Cursor for Data Science
            Download the macOS app below.
            **Browser version:** https://yc-able-production.up.railway.app/app
