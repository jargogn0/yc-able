name: Build & Release Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact: "desktop/dist/*.dmg"
          - os: windows-latest
            platform: win
            artifact: "desktop/dist/*.exe"
          - os: ubuntu-latest
            platform: linux
            artifact: "desktop/dist/*.AppImage"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build ${{ matrix.platform }}
        working-directory: desktop
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          USE_HARD_LINKS: false
          DEBUG: electron-builder

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 19labs-${{ matrix.platform }}
          path: ${{ matrix.artifact }}
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "19Labs v1.0.0"
          draft: false
          prerelease: false
          body: |
            ## 19Labs - The Cursor for Data Science

            | Platform | Download |
            |----------|----------|
            | macOS | `19Labs-1.0.0.dmg` |
            | Windows | `19Labs Setup 1.0.0.exe` |
            | Linux | `19Labs-1.0.0.AppImage` |

            **Browser:** https://yc-able-production.up.railway.app/app
          files: artifacts/*
