name: Build & Release Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact: "dist/*.dmg"
          - os: windows-latest
            platform: win
            artifact: "dist/*.exe"
          - os: ubuntu-latest
            platform: linux
            artifact: "dist/*.AppImage"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build ${{ matrix.platform }}
        run: npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 19labs-${{ matrix.platform }}
          path: desktop/${{ matrix.artifact }}
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "19Labs v1.0.0"
          draft: false
          prerelease: false
          body: |
            ## 19Labs Desktop App — The Cursor for Data Science

            ### Download
            | Platform | File |
            |----------|------|
            | macOS (Intel + Apple Silicon) | `19Labs-1.0.0.dmg` |
            | Windows | `19Labs Setup 1.0.0.exe` |
            | Linux | `19Labs-1.0.0.AppImage` |

            **Or use in the browser:** https://yc-able-production.up.railway.app/app
          files: artifacts/**/*
