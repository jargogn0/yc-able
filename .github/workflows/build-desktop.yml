name: Build & Release Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            platform: mac
            artifact: "desktop/dist/*.dmg"
          - os: windows-latest
            platform: win
            artifact: "desktop/dist/*.exe"
          - os: ubuntu-latest
            platform: linux
            artifact: "desktop/dist/*.AppImage"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build ${{ matrix.platform }}
        working-directory: desktop
        run: npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          USE_HARD_LINKS: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 19labs-${{ matrix.platform }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "19Labs v1.0.0"
          draft: false
          prerelease: false
          make_latest: true
          body: |
            ## 19Labs — The Cursor for Data Science

            | Platform | Download |
            |----------|----------|
            | macOS (Intel) | `19Labs-1.0.0.dmg` |
            | Windows | `19Labs Setup 1.0.0.exe` |
            | Linux | `19Labs-1.0.0.AppImage` |

            **Browser version:** https://yc-able-production.up.railway.app/app
          files: artifacts/*
