name: Build & Release Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install linux deps
        if: matrix.platform == 'linux'
        run: sudo apt-get install -y libfuse2

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Show electron version
        working-directory: desktop
        run: node_modules/.bin/electron --version || echo 'no electron binary'

      - name: Build ${{ matrix.platform }}
        working-directory: desktop
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          USE_HARD_LINKS: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List dist
        if: always()
        working-directory: desktop
        run: ls -la dist/ || echo 'no dist folder'

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: 19labs-${{ matrix.platform }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.exe
            desktop/dist/*.AppImage
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !failure() }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - run: find artifacts -type f
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "19Labs v1.0.0"
          files: artifacts/*
          body: |
            ## 19Labs - The Cursor for Data Science
            | Platform | Download |
            |----------|----------|
            | macOS | 19Labs-1.0.0.dmg |
            | Windows | 19Labs Setup 1.0.0.exe |
            | Linux | 19Labs-1.0.0.AppImage |
            **Browser:** https://yc-able-production.up.railway.app/app
