name: Build macOS App

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'desktop/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: desktop
        run: npm install --legacy-peer-deps

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=v${{ inputs.version || '1.0.0' }}" >> $GITHUB_OUTPUT
          fi

      - name: Build macOS DMG (Intel + Apple Silicon)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build:mac
          echo "=== Build artifacts ==="
          ls -lh dist/

      - name: Upload DMG as artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: 19Labs-mac-dmg
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "19Labs ${{ steps.version.outputs.version }}"
          make_latest: true
          body: |
            ## 19Labs Desktop for macOS

            | Mac Type | File |
            |----------|------|
            | Apple Silicon (M1/M2/M3) | `19Labs-*-arm64.dmg` |
            | Intel Mac | `19Labs-*.dmg` (no `-arm64` suffix) |

            **Install:** Download DMG → drag to Applications → first launch: right-click → Open
          draft: false
          prerelease: false
          files: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
