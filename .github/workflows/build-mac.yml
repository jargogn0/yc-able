name: Build macOS App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1)'
        required: false
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: desktop
        run: npm install --legacy-peer-deps

      - name: Verify electron-builder installed
        working-directory: desktop
        run: ./node_modules/.bin/electron-builder --version

      - name: Build macOS DMG (Intel + Apple Silicon)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./node_modules/.bin/electron-builder --mac
          echo "=== Built artifacts ==="
          ls -lh dist/

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=v${{ inputs.version || '1.0.0' }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifacts (always available)
        uses: actions/upload-artifact@v4
        with:
          name: 19Labs-macOS
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
          retention-days: 30

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "19Labs ${{ steps.tag.outputs.tag }}"
          make_latest: true
          body: |
            ## 19Labs Desktop for macOS

            | Mac Type | File to download |
            |----------|-----------------|
            | Apple Silicon (M1/M2/M3) | `19Labs-*-arm64.dmg` |
            | Intel Mac | `19Labs-*.dmg` (no `-arm64` in name) |

            **Install:**
            1. Download the DMG for your Mac
            2. Open it → drag **19Labs** to Applications
            3. First launch: right-click → **Open** → **Open** (Gatekeeper bypass)

            **Web version:** https://yc-able.com/app
          draft: false
          prerelease: false
          files: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
