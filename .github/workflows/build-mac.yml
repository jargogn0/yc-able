name: Build macOS App

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'desktop/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No npm cache — desktop/package-lock.json is not committed

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=v${{ inputs.version || '1.0.0' }}" >> $GITHUB_OUTPUT
          fi

      - name: Build macOS DMG (Intel + Apple Silicon)
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build:mac
          echo "Build complete. Artifacts:"
          ls -lh dist/

      - name: Create GitHub Release and upload DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "19Labs ${{ steps.version.outputs.version }}"
          body: |
            ## 19Labs Desktop for macOS

            ### Download
            | Mac Type | File |
            |----------|------|
            | Apple Silicon (M1/M2/M3) | `19Labs-*-arm64.dmg` |
            | Intel Mac | `19Labs-*.dmg` (no `-arm64` suffix) |

            **How to install:**
            1. Download the right DMG for your Mac ( → About This Mac → Chip)
            2. Open the DMG and drag **19Labs** into Applications
            3. First launch: right-click → **Open** → **Open** to bypass Gatekeeper

            **What you get:** Native macOS app window, no browser tabs, full ML training via yc-able.com.
          draft: false
          prerelease: false
          files: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
