<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#fff;color:#202124;font-family:'Inter','Google Sans',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
canvas{position:fixed;inset:0;z-index:0}

nav{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;height:64px;padding:0 24px 0 28px}
.n-logo{font-size:15px;font-weight:500;color:#202124;text-decoration:none;display:flex;align-items:center;gap:6px;letter-spacing:-.2px}
.n-logo svg{width:24px;height:24px}
.n-logo span{font-weight:400;color:#5f6368}
.n-links{display:flex;align-items:center;gap:8px;margin-left:24px}
.n-links a{font-size:14px;color:#3c4043;text-decoration:none;padding:8px 12px;font-weight:400;border-radius:6px;transition:background .15s}
.n-links a:hover{background:rgba(0,0,0,.04)}
.n-links .has-arrow::after{content:'';display:inline-block;width:0;height:0;border-left:3.5px solid transparent;border-right:3.5px solid transparent;border-top:4px solid #5f6368;margin-left:6px;vertical-align:middle;position:relative;top:-0.5px}
.n-r{margin-left:auto}
.n-r a{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:#fff;background:#202124;padding:10px 20px;border-radius:8px;text-decoration:none;transition:all .2s;border:none}
.n-r a:hover{background:#1a73e8}
.n-r a svg{width:16px;height:16px}

.page{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;pointer-events:none;text-align:center;padding-bottom:20px}
.page>*{pointer-events:auto}
.logo-mark{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px}
.logo-mark svg{width:36px;height:36px}
.logo-mark .wordmark{font-size:28px;font-weight:400;color:#202124;letter-spacing:-.5px}
.logo-mark .wordmark b{font-weight:400}
h1{font-size:22px;font-weight:400;color:#202124;margin-bottom:16px}
.sub{font-size:14px;color:#5f6368;line-height:1.6;margin-bottom:28px}
.sub a{color:#1a73e8;text-decoration:none}
.sub a:hover{text-decoration:underline}

.dl-section{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:24px}
.dl-btn{display:inline-flex;align-items:center;gap:10px;font-size:15px;font-weight:500;color:#fff;background:#202124;padding:14px 32px;border-radius:12px;text-decoration:none;transition:all .2s;border:none;cursor:pointer;letter-spacing:-.2px}
.dl-btn:hover{background:#1a73e8;transform:translateY(-1px);box-shadow:0 4px 16px rgba(26,115,232,.3)}
.dl-btn svg{width:20px;height:20px}
.dl-platforms{display:flex;align-items:center;gap:16px;font-size:12px;color:#5f6368}
.dl-platforms a{color:#5f6368;text-decoration:none;display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;transition:all .15s}
.dl-platforms a:hover{color:#202124;background:rgba(0,0,0,.04)}
.dl-platforms a svg{width:14px;height:14px}
.dl-or{font-size:13px;color:#5f6368;margin-bottom:4px}
.dl-or a{color:#1a73e8;text-decoration:none;font-weight:500}
.dl-or a:hover{text-decoration:underline}

.foot-links{display:flex;align-items:center;gap:4px;font-size:13px}
.foot-links a{color:#1a73e8;text-decoration:none;padding:4px 8px}
.foot-links a:hover{text-decoration:underline}
.foot-links .sep{color:#dadce0;font-size:12px;user-select:none}

@media(max-width:640px){
  .n-links{display:none}
  .logo-mark .wordmark{font-size:22px}
  h1{font-size:18px}
  .dl-btn{padding:12px 24px;font-size:14px}
}
</style>
</head>
<body>

<nav>

    <a href="/app">Pricing</a>
    <a href="https://github.com/jargogn0/yc-able" target="_blank">GitHub</a>
    <a href="#" class="has-arrow">Resources</a>
  </div>
  <div class="n-r">
    <a href="/app">Launch App <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg></a>

  </div>
  <h1>Autonomous ML Research Platform</h1>

  <div class="dl-section">
    <a href="#" class="dl-btn" id="dl-main">

        macOS

    <p class="dl-or">or <a href="/app">use in browser</a></p>

</div>

<script>
const c=document.getElementById('c'),g=c.getContext('2d');
let W,H,mx=-9e3,my=-9e3;

// Multi-color palette matching Antigravity: blue, red, purple, orange
const COLORS=[
  [66,133,244],  // google blue
  [66,133,244],  // blue again (dominant)
  [66,133,244],  // blue (heavy weight)
  [100,100,244], // blue-purple
  [120,90,220],  // purple
  [234,67,53],   // red
  [234,67,53],   // red
  [180,60,60],   // dark red
  [251,188,4],   // yellow (rare)
  [100,120,230], // indigo
];

const N=220, R=160, pts=[];

function sz(){
  W=c.width=innerWidth;
  H=c.height=innerHeight;
  if(!pts.length)init();
}

function init(){
  pts.length=0;
  for(let i=0;i<N;i++){
    const s=.8+Math.random()*2;
    const col=COLORS[Math.floor(Math.random()*COLORS.length)];
    pts.push({
      x:Math.random()*W, y:Math.random()*H,
      hx:0, hy:0,
      vx:0, vy:0,
      s,
      len:s*(2+Math.random()*5),
      a:Math.random()*Math.PI*2,
      ra:(Math.random()-.5)*.012,
      o:.1+Math.random()*.3,
      col,
    });
    pts[i].hx=pts[i].x;
    pts[i].hy=pts[i].y;
  }
}

function draw(){
  g.clearRect(0,0,W,H);
  for(const p of pts){
    const dx=p.x-mx, dy=p.y-my, d=Math.sqrt(dx*dx+dy*dy);
    if(d<R&&d>0){
      const f=(R-d)/R*.5;
      p.vx+=dx/d*f;
      p.vy+=dy/d*f;
    }
    p.vx+=(p.hx-p.x)*.015;
    p.vy+=(p.hy-p.y)*.015;
    p.vx*=.94;
    p.vy*=.94;
    p.x+=p.vx;
    p.y+=p.vy;
    p.a+=p.ra;

    g.save();
    g.translate(p.x,p.y);
    g.rotate(p.a);
    g.beginPath();
    g.moveTo(-p.len/2,0);
    g.lineTo(p.len/2,0);
    g.strokeStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${p.o})`;
    g.lineWidth=p.s;
    g.lineCap='round';
    g.stroke();
    g.restore();
  }
  requestAnimationFrame(draw);
}

addEventListener('resize',sz);
addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',()=>{mx=-9e3;my=-9e3});
addEventListener('touchmove',e=>{if(e.touches[0]){mx=e.touches[0].clientX;my=e.touches[0].clientY}},{passive:true});
addEventListener('touchend',()=>{mx=-9e3;my=-9e3});
sz();draw();

// OS detection for download button
(function(){
  const btn=document.getElementById('dl-main');
  const lbl=document.getElementById('dl-label');
  const ua=navigator.userAgent||navigator.platform||'';
  const base='https://github.com/jargogn0/yc-able/releases/latest';
  let os='macOS',icon='';
  if(/Win/.test(ua)){os='Windows'}
  else if(/Linux/.test(ua)&&!/Android/.test(ua)){os='Linux'}
  else{os='macOS'}
  lbl.textContent='Download for '+os;
  btn.href=base;
  // Highlight current platform
  const id=os==='macOS'?'dl-mac':os==='Windows'?'dl-win':'dl-linux';
  const el=document.getElementById(id);
  if(el)el.style.fontWeight='600';
})();
</script>
</body>
