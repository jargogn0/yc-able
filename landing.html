<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>19Labs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,200;0,14..32,300;0,14..32,400;0,14..32,500;1,14..32,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#060608;color:#fff;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}

canvas{position:fixed;inset:0;z-index:0}

/* subtle radial glow behind content */
.glow-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 50% 55%, rgba(99,102,241,.07) 0%, transparent 70%);
}

/* ── Nav ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;height:58px;padding:0 32px;
}
.n-logo{
  font-size:15px;font-weight:500;color:#fff;text-decoration:none;letter-spacing:-.25px;
}
.n-logo em{font-style:normal;color:rgba(255,255,255,.3);font-weight:300}
.n-links{display:flex;align-items:center;gap:1px;margin-left:32px}
.n-links a{
  font-size:13px;color:rgba(255,255,255,.42);text-decoration:none;
  padding:6px 11px;border-radius:6px;transition:color .15s;font-weight:400;
}
.n-links a:hover{color:rgba(255,255,255,.85)}
.n-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.n-r .n-app{
  font-size:13px;font-weight:400;color:rgba(255,255,255,.5);text-decoration:none;transition:color .15s;
}
.n-r .n-app:hover{color:#fff}
.n-r .n-dl{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;font-weight:500;color:#fff;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);
  padding:7px 16px;border-radius:8px;text-decoration:none;transition:all .2s;
}
.n-r .n-dl:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.22)}

/* ── Hero ── */
.page{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:10;pointer-events:none;text-align:center;
}
.page>*{pointer-events:auto}

.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.35);margin-bottom:26px;
}
.eyebrow-dot{
  width:5px;height:5px;border-radius:50%;
  background:#6366f1;box-shadow:0 0 10px #6366f1;
  animation:pulse 2.5s ease-in-out infinite;
}

h1{
  font-size:64px;font-weight:200;line-height:1.06;
  letter-spacing:-3px;margin-bottom:20px;
  color:#fff;
}
h1 strong{font-weight:500;letter-spacing:-3px}

.sub{
  font-size:14.5px;color:rgba(255,255,255,.35);
  line-height:1.75;margin-bottom:44px;font-weight:300;
  letter-spacing:.01em;
}

/* ── Download CTA ── */
.cta{display:flex;flex-direction:column;align-items:center;gap:16px}

.cta-row{display:flex;align-items:center;gap:10px}

.dl-primary{
  display:inline-flex;align-items:center;gap:8px;
  font-size:14px;font-weight:500;color:#fff;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  padding:12px 26px;border-radius:9px;text-decoration:none;
  transition:all .25s;letter-spacing:-.15px;
  box-shadow:0 0 0 1px rgba(99,102,241,.3),0 4px 20px rgba(99,102,241,.25);
}
.dl-primary:hover{
  transform:translateY(-1px);
  box-shadow:0 0 0 1px rgba(99,102,241,.5),0 8px 30px rgba(99,102,241,.4);
}
.dl-primary svg{width:15px;height:15px;opacity:.85}

.dl-secondary{
  display:inline-flex;align-items:center;gap:8px;
  font-size:14px;font-weight:400;color:rgba(255,255,255,.55);
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  padding:12px 22px;border-radius:9px;text-decoration:none;transition:all .2s;
}
.dl-secondary:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.15)}

.platforms{
  display:flex;align-items:center;gap:18px;
  font-size:11.5px;color:rgba(255,255,255,.22);
}
.platforms a{color:rgba(255,255,255,.22);text-decoration:none;transition:color .15s}
.platforms a:hover{color:rgba(255,255,255,.6)}
.platforms-sep{color:rgba(255,255,255,.1)}

@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
@media(max-width:680px){.n-links{display:none}h1{font-size:40px;letter-spacing:-2px}.cta-row{flex-direction:column}}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="glow-bg"></div>

<nav>
  <a href="/" class="n-logo">19<em>Labs</em></a>
  <div class="n-links">
    <a href="/app">Product</a>
    <a href="#">Pricing</a>
    <a href="https://github.com/jargogn0/yc-able" target="_blank">GitHub</a>
    <a href="#">Docs</a>
  </div>
  <div class="n-r">
    <a href="/app" class="n-app">Open App</a>
    <a href="https://github.com/jargogn0/yc-able/releases/latest" class="n-dl" id="nav-dl">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span id="nav-dl-label">Download</span>
    </a>
  </div>
</nav>

<div class="page">
  <div class="eyebrow"><span class="eyebrow-dot"></span>Now in Early Access</div>

  <h1>The Cursor for<br><strong>Data Science</strong></h1>

  <p class="sub">Drop a dataset. Describe your goal.<br>Get a trained model — no code needed.</p>

  <div class="cta">
    <div class="cta-row">
      <a href="https://github.com/jargogn0/yc-able/releases/latest" class="dl-primary" id="dl-main">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span id="dl-label">Download for macOS</span>
      </a>
      <a href="/app" class="dl-secondary">Use in browser</a>
    </div>
    <div class="platforms">
      <a href="https://github.com/jargogn0/yc-able/releases/latest">macOS</a>
      <span class="platforms-sep">·</span>
      <a href="https://github.com/jargogn0/yc-able/releases/latest">Windows</a>
      <span class="platforms-sep">·</span>
      <a href="https://github.com/jargogn0/yc-able/releases/latest">Linux</a>
      <span class="platforms-sep">·</span>
      <a href="https://github.com/jargogn0/yc-able/releases" style="color:rgba(255,255,255,.18)">All releases</a>
    </div>
  </div>
</div>

<script>
// ── Compact, elegant neural network ─────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
const mouse  = { x: -9999, y: -9999 };

// Smaller, tighter architecture
const ARCH = [3, 5, 7, 9, 7, 5, 3];

const COLORS = [
  [99,  102, 241],  // indigo
  [139, 92,  246],  // violet
  [168, 85,  247],  // purple
  [59,  130, 246],  // blue
  [20,  184, 166],  // teal
];

let nodes = [], edges = [], pulses = [];
let tick = 0;

function rebuild() {
  nodes = []; edges = []; pulses = [];

  // Network occupies center 55% of screen width, 60% height
  const netW = Math.min(W * 0.55, 700);
  const netH = Math.min(H * 0.55, 380);
  const ox = (W - netW) / 2;
  const oy = (H - netH) / 2 + 30; // shift down slightly

  ARCH.forEach((count, li) => {
    const lx = ox + (li / (ARCH.length - 1)) * netW;
    for (let i = 0; i < count; i++) {
      const ly = oy + ((i + 0.5) / count) * netH;
      nodes.push({
        bx: lx, by: ly,
        x: lx, y: ly,
        vx: 0, vy: 0,
        r: 2.8,
        layer: li,
        glow: 0,
        glowColor: COLORS[0],
      });
    }
  });

  // Connect all nodes in adjacent layers (classic MLP)
  let base = 0;
  for (let li = 0; li < ARCH.length - 1; li++) {
    const c0 = ARCH[li], c1 = ARCH[li + 1];
    for (let a = 0; a < c0; a++) {
      for (let b = 0; b < c1; b++) {
        edges.push({ a: base + a, b: base + c0 + b });
      }
    }
    base += c0;
  }
}

function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
  rebuild();
}

function layerStartIndex(li) {
  let idx = 0;
  for (let i = 0; i < li; i++) idx += ARCH[i];
  return idx;
}

function fireSignal() {
  // Pick a random layer→layer+1 edge and send a pulse
  const li = Math.floor(Math.random() * (ARCH.length - 1));
  const base = layerStartIndex(li);
  const nextBase = base + ARCH[li];
  const a = base + Math.floor(Math.random() * ARCH[li]);
  const b = nextBase + Math.floor(Math.random() * ARCH[li + 1]);
  const col = COLORS[Math.floor(Math.random() * COLORS.length)];
  pulses.push({ a, b, t: 0, speed: 0.022 + Math.random() * 0.012, color: col });
}

function draw() {
  tick++;
  ctx.clearRect(0, 0, W, H);

  // Animate nodes (subtle drift + mouse repulsion)
  nodes.forEach(n => {
    const dx = n.x - mouse.x, dy = n.y - mouse.y;
    const d  = Math.hypot(dx, dy);
    if (d < 100 && d > 0) {
      const f = ((100 - d) / 100) * 0.28;
      n.vx += dx / d * f;
      n.vy += dy / d * f;
    }
    n.vx += (n.bx - n.x) * 0.03;
    n.vy += (n.by - n.y) * 0.03;
    n.vx *= 0.82;
    n.vy *= 0.82;
    n.x  += n.vx;
    n.y  += n.vy;
    if (n.glow > 0) n.glow -= 0.03;
  });

  // Draw edges
  ctx.lineWidth = 0.6;
  edges.forEach(e => {
    const a = nodes[e.a], b = nodes[e.b];
    // Dim edge, slightly brighter if either endpoint is glowing
    const glow  = Math.max(a.glow, b.glow);
    const alpha = 0.06 + glow * 0.12;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.stroke();
  });

  // Draw pulses
  pulses = pulses.filter(p => p.t < 1);
  pulses.forEach(p => {
    p.t += p.speed;
    const a = nodes[p.a], b = nodes[p.b];
    const px = a.x + (b.x - a.x) * p.t;
    const py = a.y + (b.y - a.y) * p.t;
    const [r, g, bl] = p.color;

    // Glow around the pulse
    const grd = ctx.createRadialGradient(px, py, 0, px, py, 9);
    grd.addColorStop(0,   `rgba(${r},${g},${bl},0.95)`);
    grd.addColorStop(0.35,`rgba(${r},${g},${bl},0.3)`);
    grd.addColorStop(1,   `rgba(${r},${g},${bl},0)`);
    ctx.beginPath();
    ctx.arc(px, py, 9, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // Tiny bright core
    ctx.beginPath();
    ctx.arc(px, py, 2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${bl},1)`;
    ctx.fill();

    if (p.t >= 0.98) {
      nodes[p.b].glow      = 1;
      nodes[p.b].glowColor = p.color;
    }
  });

  // Draw nodes
  nodes.forEach(n => {
    const [r, g, bl] = n.glow > 0.05 ? n.glowColor : [180, 180, 200];
    const glow = Math.max(0, n.glow);

    if (glow > 0.02) {
      const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, 18);
      grd.addColorStop(0, `rgba(${r},${g},${bl},${glow * 0.55})`);
      grd.addColorStop(1, `rgba(${r},${g},${bl},0)`);
      ctx.beginPath();
      ctx.arc(n.x, n.y, 18, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r + glow * 1.8, 0, Math.PI * 2);
    ctx.fillStyle = glow > 0.05
      ? `rgba(${r},${g},${bl},${0.7 + glow * 0.3})`
      : 'rgba(255,255,255,0.22)';
    ctx.fill();
  });

  // Fire pulses rhythmically — cascade through layers
  if (tick % 22 === 0 && pulses.length < 18) fireSignal();
  // Occasional multi-fire burst
  if (tick % 110 === 0) {
    for (let i = 0; i < 4; i++) setTimeout(fireSignal, i * 60);
  }

  requestAnimationFrame(draw);
}

addEventListener('resize', resize);
addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
addEventListener('touchmove', e => {
  if (e.touches[0]) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }
}, { passive: true });
addEventListener('touchend', () => { mouse.x = -9999; mouse.y = -9999; });

resize();
draw();

// OS detection
(function() {
  const lbl     = document.getElementById('dl-label');
  const navLbl  = document.getElementById('nav-dl-label');
  const ua      = navigator.userAgent || '';
  let os = 'macOS';
  if (/Win/i.test(ua))                           os = 'Windows';
  else if (/Linux/i.test(ua) && !/Android/i.test(ua)) os = 'Linux';
  lbl.textContent    = 'Download for ' + os;
  navLbl.textContent = 'Download';
})();
</script>
</body>
</html>
