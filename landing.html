<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>19Labs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;color:#202124;font-family:'Inter',system-ui,sans-serif;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
canvas{position:fixed;inset:0;z-index:0}

/* Nav — minimal top bar */
nav{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;padding:0 32px;height:56px}
.logo{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;letter-spacing:-.5px;color:#202124;text-decoration:none;display:flex;align-items:center;gap:6px}
.logo b{color:#4285f4}
.nav-links{display:flex;gap:28px;margin-left:40px}
.nav-links a{font-size:14px;color:#5f6368;text-decoration:none;font-weight:500}
.nav-links a:hover{color:#202124}
.nav-r{margin-left:auto}
.nav-r a{font-size:13px;font-weight:600;color:#fff;background:#202124;padding:9px 22px;border-radius:8px;text-decoration:none;transition:background .2s}
.nav-r a:hover{background:#4285f4}

/* Center content */
.center{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;pointer-events:none;text-align:center;padding:0 24px}
.center>*{pointer-events:auto}
.mark{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;letter-spacing:-1px;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.mark b{color:#4285f4;font-weight:700}
h1{font-size:20px;font-weight:500;color:#202124;margin-bottom:10px}
p{font-size:14px;color:#5f6368;margin-bottom:28px}
p a{color:#4285f4;text-decoration:none}
p a:hover{text-decoration:underline}
.links{display:flex;gap:16px;font-size:13px}
.links a{color:#4285f4;text-decoration:none}
.links a:hover{text-decoration:underline}
.links span{color:#dadce0}

@media(max-width:600px){
  .nav-links{display:none}
  .mark{font-size:22px}
  h1{font-size:17px}
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<nav>
  <a href="/" class="logo"><b>19</b>Labs</a>
  <div class="nav-links">
    <a href="/app">Product</a>
    <a href="https://github.com/jargogn0/yc-able" target="_blank">GitHub</a>
  </div>
  <div class="nav-r">
    <a href="/app">Launch App</a>
  </div>
</nav>

<div class="center">
  <div class="mark"><b>19</b>Labs</div>
  <h1>Autonomous ML Research</h1>
  <p>Drop a dataset. Get a deployed model. <a href="/app">Open the app</a> to start.</p>
  <div class="links">
    <a href="/app">App</a>
    <span>|</span>
    <a href="https://github.com/jargogn0/yc-able" target="_blank">GitHub</a>
  </div>
</div>

<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let W,H,mx=-9e3,my=-9e3;
const N=160,R=180,pts=[];

function sz(){W=c.width=innerWidth;H=c.height=innerHeight;if(!pts.length)init();else pts.forEach(p=>{p.hx=p.hx/p._W*W;p.hy=p.hy/p._H*H;p.x=p.hx;p.y=p.hy;p._W=W;p._H=H})}

function init(){
  pts.length=0;
  for(let i=0;i<N;i++){
    const s=1+Math.random()*2.5;
    pts.push({
      x:Math.random()*W,y:Math.random()*H,
      hx:0,hy:0,
      vx:0,vy:0,
      s,
      len:s*(2.5+Math.random()*4),
      a:Math.random()*Math.PI*2,
      ra:(Math.random()-.5)*.015,
      o:.12+Math.random()*.3,
      _W:W,_H:H
    });
    pts[i].hx=pts[i].x;pts[i].hy=pts[i].y;
  }
}

function draw(){
  x.clearRect(0,0,W,H);
  for(const p of pts){
    const dx=p.x-mx,dy=p.y-my,d=Math.sqrt(dx*dx+dy*dy);
    if(d<R&&d>0){
      const f=(R-d)/R*.6;
      p.vx+=dx/d*f;
      p.vy+=dy/d*f;
    }
    p.vx+=(p.hx-p.x)*.018;
    p.vy+=(p.hy-p.y)*.018;
    p.vx*=.93;p.vy*=.93;
    p.x+=p.vx;p.y+=p.vy;
    p.a+=p.ra;

    x.save();
    x.translate(p.x,p.y);
    x.rotate(p.a);
    x.beginPath();
    x.moveTo(-p.len/2,0);
    x.lineTo(p.len/2,0);
    x.strokeStyle=`rgba(66,133,244,${p.o})`;
    x.lineWidth=p.s;
    x.lineCap='round';
    x.stroke();
    x.restore();
  }
  requestAnimationFrame(draw);
}

addEventListener('resize',sz);
addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
addEventListener('mouseleave',()=>{mx=-9e3;my=-9e3});
addEventListener('touchmove',e=>{if(e.touches[0]){mx=e.touches[0].clientX;my=e.touches[0].clientY}},{passive:true});
addEventListener('touchend',()=>{mx=-9e3;my=-9e3});

sz();draw();
</script>
</body>
</html>
