<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:transparent;display:flex;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-app-region:drag;user-select:none}
.card{background:#fff;border-radius:20px;padding:48px 56px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.12)}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px}
.logo svg{width:36px;height:36px}
.logo span{font-size:24px;font-weight:500;color:#202124;letter-spacing:-.5px}
.sub{font-size:13px;color:#5f6368;margin-bottom:24px}
.dots{display:flex;gap:6px;justify-content:center}
.dots span{width:6px;height:6px;border-radius:50%;animation:pulse 1.4s infinite}
.dots span:nth-child(1){background:#4285f4;animation-delay:0s}
.dots span:nth-child(2){background:#ea4335;animation-delay:.2s}
.dots span:nth-child(3){background:#fbbc04;animation-delay:.4s}
.dots span:nth-child(4){background:#34a853;animation-delay:.6s}
@keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 48 48" fill="none"><path d="M24 4L4 39h8l12-22 12 22h8L24 4z" fill="#4285f4"/><path d="M17 29L12 39h8l2-5-5-5z" fill="#ea4335"/><path d="M31 29l5 10h-8l-2-5 5-5z" fill="#fbbc04"/><path d="M24 16l-7 13h14L24 16z" fill="#34a853"/></svg>
    <span>19Labs</span>
  </div>
  <p class="sub">Loading your workspace…</p>
  <div class="dots"><span></span><span></span><span></span><span></span></div>
</div>
</body>
</html>
