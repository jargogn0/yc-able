<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:transparent;display:flex;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;-webkit-app-region:drag;user-select:none}.card{background:#09090b;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:44px 52px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.6)}.logo{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;background:#6366f1;border-radius:10px;font-size:16px;font-weight:600;color:#fff;margin-bottom:20px}.name{font-size:18px;font-weight:500;color:#fff;margin-bottom:8px;letter-spacing:-.3px}.sub{font-size:12px;color:rgba(255,255,255,.35);margin-bottom:28px;font-weight:300}.dots{display:flex;gap:5px;justify-content:center}.dots span{width:5px;height:5px;border-radius:50%;animation:p 1.2s infinite}.dots span:nth-child(1){background:#6366f1;animation-delay:0s}.dots span:nth-child(2){background:#8b5cf6;animation-delay:.15s}.dots span:nth-child(3){background:#6366f1;animation-delay:.3s}@keyframes p{0%,80%,100%{opacity:.25;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}</style></head><body><div class="card"><div class="logo">19</div><div class="name">19Labs</div><div class="sub">Loading your workspace…</div><div class="dots"><span></span><span></span><span></span></div></div></body></html>
