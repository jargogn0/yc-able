<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100vh; background: #09090b; }
    body { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    .logo { width: 72px; height: 72px; border-radius: 18px; background: #4f46e5; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 700; letter-spacing: -1px; margin-bottom: 4px; }
    .dots { display: flex; gap: 6px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #6366f1; animation: pulse 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }
    p { font-size: 13px; color: #71717a; margin: 0; }
  </style>
</head>
<body>
  <div class="logo">19</div>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <p>Loading 19Labs…</p>
</body>
</html>
