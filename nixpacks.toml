[phases.setup]
aptPkgs = ["libgomp1", "libopenblas-dev", "liblapack-dev", "libomp-dev"]
cmds = [
  "find /usr/lib -name 'libgomp.so*' -exec echo 'Found: {}' \\;",
  "echo /usr/lib/x86_64-linux-gnu > /etc/ld.so.conf.d/x86_64-extra.conf",
  "echo /usr/lib/aarch64-linux-gnu > /etc/ld.so.conf.d/aarch64-extra.conf",
  "ldconfig"
]

[phases.install]
cmds = ["pip install -r requirements.txt"]
